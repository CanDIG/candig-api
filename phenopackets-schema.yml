openapi: 3.0.3
info:
  title: GA4GH Phenopackets v2 API
  description: >
    OpenAPI schema covering the full GA4GH Phenopackets v2 data model.
    Field descriptions are derived from the official Phenopackets v2 protobuf schemas
    and documentation, and aim to preserve their precise semantics.
  version: "2.0.0"
servers:
  - url: /v2
paths: {}
components:
  schemas:

    Phenopacket:
      description: >
        A Phenopacket is a container for sharing an individual case or biosample
        with phenotypic features, diagnoses, measurements, genomic interpretations,
        and associated metadata.
      type: object
      required: [id, subject]
      properties:
        id:
          type: string
          description: >
            A unique identifier for this phenopacket instance.
        subject:
          $ref: '#/components/schemas/Individual'
          description: >
            The individual (patient or organism) that is the subject of this phenopacket.
        phenotypic_features:
          type: array
          description: >
            A list of phenotypic features observed or explicitly excluded in the subject.
          items:
            $ref: '#/components/schemas/PhenotypicFeature'
        measurements:
          type: array
          description: >
            Quantitative or qualitative measurements obtained from the subject.
          items:
            $ref: '#/components/schemas/Measurement'
        biosamples:
          type: array
          description: >
            Biosamples collected from the subject, such as tissue samples or cell lines.
          items:
            $ref: '#/components/schemas/Biosample'
        interpretations:
          type: array
          description: >
            Clinical or research interpretations derived from phenotypic and/or genomic data.
          items:
            $ref: '#/components/schemas/Interpretation'
        diseases:
          type: array
          description: >
            Diseases or conditions diagnosed or considered for the subject.
          items:
            $ref: '#/components/schemas/Disease'
        files:
          type: array
          description: >
            External files associated with this phenopacket, such as genomic data files.
          items:
            $ref: '#/components/schemas/File'
        metaData:
          $ref: '#/components/schemas/MetaData'
          description: >
            Metadata describing the provenance, resources, and updates for this phenopacket.

    Individual:
      description: >
        Represents an individual organism, typically a patient or study subject.
      type: object
      required: 
        - id
      properties:
        id:
          type: string
          description: >
            A unique identifier for the individual within the scope of the phenopacket.
        alternate_ids:
          type: array
          description: >
            Alternative identifiers that may be used for the individual in other systems.
          items:
            type: string
        date_of_birth:
          $ref: '#/components/schemas/TimeElement'
          description: >
            The date or age at which the individual was born.
        time_at_last_encounter:
          $ref: '#/components/schemas/TimeElement'
          description: >
            The age or age range of the individual when last encountered. RECOMMENDED.
        vital_status:
          $ref: '#/components/schemas/VitalStatus'
          description: >
            The vital status of the individual e.g. whether they are alive or the time and cause of death. RECOMMENDED.
        sex:
          $ref: '#/components/schemas/Sex'
          description: >
            The phenotypic sex of the individual.
        karyotypic_sex:
          $ref: '#/components/schemas/KaryotypicSex'
          description: >
            The chromosomal (karyotypic) sex of the individual, if known.
        gender:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            Self-identified gender
        taxonomy:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The taxonomic classification of the individual, typically a species identifier.

    PhenotypicFeature:
      description: >
        A phenotypic feature that is observed or explicitly excluded in an individual
        or biosample.
      type: object
      required: [type]
      properties:
        type:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The ontology term describing the phenotypic feature.
        description:
          type: string
          description: >
            A free-text description providing additional detail about the feature.
        excluded:
          type: boolean
          description: >
            Indicates whether the feature was explicitly excluded (true) or observed (false).
        severity:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            An ontology term describing the severity of the phenotypic feature.
        modifiers:
          type: array
          description: >
            Ontology terms that modify or further specify the phenotypic feature.
          items:
            $ref: '#/components/schemas/OntologyClass'
        onset:
          $ref: '#/components/schemas/TimeElement'
          description: >
            The time at which the phenotypic feature first became apparent.
        resolution:
          $ref: '#/components/schemas/TimeElement'
          description: >
            The time at which the phenotypic feature resolved, if applicable.
        evidence:
          type: array
          description: >
            Evidence supporting the assertion of this phenotypic feature.
          items:
            $ref: '#/components/schemas/Evidence'

    Measurement:
      description: >
        A quantitative or qualitative measurement obtained from an individual or biosample.
      type: object
      required: [assay, measurement_value]
      properties:
        description:
          type: string
          description: free text 
        assay:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The assay or test used to generate the measurement.
        measurement_value:
          $ref: '#/components/schemas/Value'
          description: >
            The measured value, either quantitative or categorical.
        time_observed:
          $ref: '#/components/schemas/TimeElement'
          description: >
            The time at which the measurement was observed or recorded.
        procedure:
          $ref: '#/components/schemas/Procedure'
          description: >
            The procedure associated with obtaining the measurement.

    Biosample:
      description: >
        A biological sample derived from an individual, such as tissue, blood, or cells.
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: >
            A unique identifier for the biosample.
        individual_id:
          type: string
          description: >
            The identifier of the individual from whom the biosample was derived.
        derived_from_id:
          type: string
          description: >
            id of the biosample from which the current biosample was derived (if applicable)
        description:
          type: string
          description: >
            A free-text description of the biosample.
        sampled_tissue:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The tissue or anatomical site from which the biosample was obtained.
        sample_type:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            type of material, e.g., RNA, DNA, Cultured cells.
        phenotypic_features:
          type: array
          description: >
            Phenotypic features observed or excluded in the context of this biosample.
          items:
            $ref: '#/components/schemas/PhenotypicFeature'
        measurements:
          type: array
          description: >
            Measurements obtained from this biosample.
          items:
            $ref: '#/components/schemas/Measurement'
        taxonomy:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            Species of the sampled individual
        time_of_collection:
          $ref: '#/components/schemas/TimeElement'
          description: >
            The time at which the biosample was collected.
        histological_diagnosis:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            Disease diagnosis that was inferred from the histological examination. RECOMMENDED.
        tumor_progression:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            Indicates primary, metastatic, recurrent. RECOMMENDED.
        tumor_grade:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            Term representing the tumor grade
        pathological_stage:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The pathological stage associated with the biosample, if applicable.
        pathological_tnm_finding:
          type: array
          description: >
            TNM pathological findings associated with the biosample.
          items:
            $ref: '#/components/schemas/OntologyClass'
        diagnostic_markers:
          type: array
          description: >
            Clinically relevant biomarkers. RECOMMENDED.
          items:
            $ref: '#/components/schemas/OntologyClass'
        procedure:
          $ref: '#/components/schemas/Procedure'
          description: >
            The procedure used to extract the biosample. RECOMMENDED.
        files:
          type: array
          items:
            $ref: '#/components/schemas/File'
          description: >
            list of files related to the biosample, e.g. VCF or other high-throughput sequencing files
        material_sample:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            Status of specimen (tumor tissue, normal control, etc.). RECOMMENDED.
        sample_processing:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            how the specimen was processed
        sample_storage:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            how the specimen was stored


    Interpretation:
      description: >
        A clinical or research interpretation derived from phenotypic and/or genomic data.
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          description: >
            A unique identifier for the interpretation.
        progress_status:
          $ref: '#/components/schemas/ProgressStatus'
          description: >
            The overall status of the interpretation.
        diagnosis:
          $ref: '#/components/schemas/Diagnosis'
          description: >
            The diagnosis resulting from this interpretation, if any.
        summary:
          type: string
          description: >
            Additional data about this interpretation

    Diagnosis:
      description: >
        A diagnosis assigned to an individual based on clinical evaluation.
      type: object
      required: [disease]
      properties:
        disease:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The disease or condition diagnosed, represented as an ontology term.
        genomic_interpretations:
          type: array
          description: >
            The genomic elements assessed as being responsible for the disease or empty
          items:
            $ref: '#/components/schemas/GenomicInterpretation'

    GenomicInterpretation:
      description: >
        An interpretation of genomic data, such as a variant or gene-level assessment.
      type: object
      required: [subject_or_biosample_id, interpretation_status, call]
      properties:
        subject_or_biosample_id:
          type: string
          description: >
            The identifier of the subject or biosample to which this interpretation applies.
        interpretation_status:
          $ref: '#/components/schemas/InterpretationStatus'
          description: >
            The status of this genomic interpretation.
        call:
          description: >
            	represents the interpretation. REQUIRED.
          oneOf:
            - $ref: '#/components/schemas/GeneDescriptor'
            - $ref: '#/components/schemas/VariantInterpretation'

    VariantInterpretation:
      description: >
        A clinical or research interpretation of a specific genomic variant.
      type: object
      required: 
        - acmg_pathogenicity_classification
        - therapeutic_actionability
        - variation_descriptor
      properties:
        acmg_pathogenicity_classification:
          type: string
          description: >
            one of the five ACMG pathogenicity categories, or NOT_PROVIDED. The default is NOT_PROVIDED
          enum:
            - NOT_PROVIDED
            - BENIGN
            - LIKELY_BENIGN
            - UNCERTAIN_SIGNIFICANCE
            - LIKELY_PATHOGENIC
            - PATHOGENIC
        therapeutic_actionability:
          type: string
          description: >
            The therapeutic actionability of the variant, default is UNKNOWN_ACTIONABILITY
          enum:
            - UNKNOWN_ACTIONABILITY
            - NOT_ACTIONABLE
            - ACTIONABLE
        variation_descriptor:
          $ref: '#/components/schemas/VariationDescriptor'
          description: >
            a genetic/genomic variant


    GeneInterpretation:
      description: >
        A clinical or research interpretation of a gene's involvement in disease.
      type: object
      required: [gene, clinicalSignificance]
      properties:
        gene:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The gene being interpreted, represented as an ontology term.
        clinicalSignificance:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The clinical significance assigned to the gene.
        evidence:
          type: array
          description: >
            Evidence supporting the gene interpretation.
          items:
            $ref: '#/components/schemas/Evidence'

    Disease:
      description: >
        A disease or condition that is diagnosed, suspected, or explicitly excluded.
      type: object
      required: [term]
      properties:
        term:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The disease or condition term.
        excluded:
          type: boolean
          description: >
            Indicates whether the disease was explicitly excluded.
        onset:
          $ref: '#/components/schemas/TimeElement'
          description: >
            The time or age of disease onset, if known.

    File:
      description: >
        A reference to an external file associated with the phenopacket.
      type: object
      required: [uri]
      properties:
        uri:
          type: string
          format: uri
          description: >
            A URI pointing to the file location.
        description:
          type: string
          description: >
            A free-text description of the file contents.
        fileAttributes:
          type: object
          description: >
            Additional attributes describing the file.
          additionalProperties:
            type: string

    MetaData:
      description: >
        Metadata capturing provenance, ontology resources, and update history.
      type: object
      required: [created, createdBy]
      properties:
        created:
          type: string
          format: date-time
          description: >
            The timestamp at which the phenopacket was created.
        createdBy:
          type: string
          description: >
            The agent or organization that created the phenopacket.
        resources:
          type: array
          description: >
            Ontology and data resources referenced in the phenopacket.
          items:
            $ref: '#/components/schemas/Resource'
        updates:
          type: array
          description: >
            A history of updates made to the phenopacket.
          items:
            $ref: '#/components/schemas/Update'

    Resource:
      description: >
        Describes an ontology or data resource used in the phenopacket.
      type: object
      required: [id, name, url, version]
      properties:
        id:
          type: string
          description: >
            A unique identifier for the resource.
        name:
          type: string
          description: >
            A human-readable name for the resource.
        url:
          type: string
          description: >
            A URL pointing to the resource homepage or documentation.
        version:
          type: string
          description: >
            The version of the resource used.
        namespacePrefix:
          type: string
          description: >
            The namespace prefix associated with the resource, if applicable.
        iriPrefix:
          type: string
          description: >
            The IRI prefix associated with the resource, if applicable.

    Update:
      description: >
        A record describing a modification made to the phenopacket.
      type: object
      required: [timestamp, comment]
      properties:
        timestamp:
          type: string
          format: date-time
          description: >
            The time at which the update occurred.
        comment:
          type: string
          description: >
            A description of the update.

    Evidence:
      description: >
        Evidence supporting a phenotypic or genomic assertion.
      type: object
      properties:
        evidenceCode:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            An ontology term describing the type of evidence.
        reference:
          type: string
          description: >
            A literature or database reference supporting the evidence.

    OntologyClass:
      description: >
        A reference to a term in a controlled ontology.
      type: object
      required: [id, label]
      properties:
        id:
          type: string
          description: >
            The compact identifier (CURIE or IRI) for the ontology term.
        label:
          type: string
          description: >
            A human-readable label for the ontology term.

    TimeElement:
      description: >
        Represents time either as an age or as an explicit time interval.
      oneOf:
        - $ref: '#/components/schemas/Age'
        - $ref: '#/components/schemas/TimeInterval'

    Age:
      description: >
        An age represented as an ISO 8601 duration.
      type: object
      properties:
        iso8601Duration:
          type: string
          description: >
            The age encoded as an ISO 8601 duration string (e.g. P5Y).

    TimeInterval:
      description: >
        A time interval with optional start and end timestamps.
      type: object
      properties:
        start:
          type: string
          format: date-time
          description: >
            The start time of the interval.
        end:
          type: string
          format: date-time
          description: >
            The end time of the interval.

    Value:
      description: >
        A value that may be quantitative or represented by an ontology term.
      oneOf:
        - $ref: '#/components/schemas/Quantity'
        - $ref: '#/components/schemas/OntologyClass'

    Quantity:
      description: >
        A numeric value with an associated unit.
      type: object
      required: [value, unit]
      properties:
        value:
          type: number
          description: >
            The numeric value of the quantity.
        unit:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            The unit in which the value is expressed.

    Sex:
      description: >
        Enumeration of phenotypic sex values.
      type: string
      enum: [UNKNOWN_SEX, MALE, FEMALE, OTHER_SEX]

    KaryotypicSex:
      description: >
        Enumeration of chromosomal sex values.
      type: string
      enum: [UNKNOWN_KARYOTYPE, XX, XY, XO, XXY, XXX, XXYY, XXXY, OTHER_KARYOTYPE]

    ProgressStatus:
      description: >
        The status of the attempted diagnosis
      type: string
      enum: [UNKNOWN_PROGRESS, IN_PROGRESS, COMPLETED, SOLVED, UNSOLVED]

    InterpretationStatus:
      description: >
        Enumeration of interpretation status values.
      type: string
      enum: [UNKNOWN_STATUS, REJECTED, CANDIDATE, CONTRIBUTORY, CAUSATIVE]

    VitalStatus:
      description: >
        This element can be used to report whether the individual is living or dead at the timepoint when the phenopacket was created (or if the status is unknown).
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/Status'
          description: >
            one of UNKNOWN_STATUS, ALIVE, DECEASED. REQUIRED.
        time_of_death:
          $ref: '#/components/schemas/TimeElement'
          description: >
            Should be left blank if patient not known to be deceased
        cause_of_death:
          $ref: '#/components/schemas/OntologyClass'
          description: >
            Should be left blank if patient not known to be deceased
        survival_time_in_days:
          type: integer
          description: >
            Number of days the patient was alive after their primary diagnosis.
    
    Status:
      description: >
        Enumeration of interpretation status values.
      type: string
      enum: [UNKNOWN_STATUS, ALIVE, DECEASED]
    
    VariationDescriptor:
      type: object
      description: >
        A descriptor for a molecular variation, including VRS variation objects,
        expressions, gene context, and metadata as defined in Phenopackets v2.
      required:
        - id
        - molecule_context
      properties:
        id:
          type: string
          description: >
            A unique identifier for this VariationDescriptor instance.

        variation:
          $ref: "#/components/schemas/Variation"
          description: >
            A GA4GH VRS Variation object describing the molecular variation.

        label:
          type: string
          description: >
            A primary human-readable label for the variation.

        alternate_labels:
          type: array
          description: >
            Additional human-readable labels or synonyms for the variation.
          items:
            type: string

        description:
          type: string
          description: >
            A free-text description of the variation.

        gene_context:
          $ref: "#/components/schemas/GeneDescriptor"
          description: >
            The gene context in which this variation is interpreted.

        expressions:
          type: array
          description: >
            Expressions of the variation using standardized syntaxes
            such as HGVS or SPDI.
          items:
            $ref: "#/components/schemas/Expression"

        vcf_record:
          $ref: "#/components/schemas/VcfRecord"
          description: >
            A VCF-based representation of the variation.

        vrs_ref_allele_seq:
          type: string
          description: >
            The reference allele sequence used for VRS Allele normalization.
            This must exactly match the reference sequence at the VRS location.

        allelic_state:
          $ref: "#/components/schemas/OntologyClass"
          description: >
            The allelic state of the variation (e.g. heterozygous, homozygous).

        structural_type:
          $ref: "#/components/schemas/OntologyClass"
          description: >
            The structural classification of the variant.

        molecule_context:
          type: string
          description: >
            The molecular context in which the variation is described.
          enum:
            - genomic
            - transcript
            - protein

        external_references:
          type: array
          description: >
            External database references supporting or describing this variation.
          items:
            $ref: "#/components/schemas/ExternalReference"

        extensions:
          type: array
          description: >
            A list of extensions for additional information not captured
            by the core schema.
          items:
            $ref: "#/components/schemas/Extension"
    
      Extension:
        type: object
        description: >
          An extension element providing additional structured information
          using ontology terms or custom fields.
        required:
          - name
          - value
        properties:
          name:
            type: string
            description: >
              A CURIE or URI identifying the meaning of the extension.
            example: "NCIT:C171003"
          value:
            description: >
              The value of the extension.
            type: string


      GeneDescriptor:
        description: >
          represents an identifier for a gene, using the Gene Descriptor from the VRSATILE Framework
        type: object
        required:
          - value_id
          - symbol
        properties:
          value_id:
            type: string
            description: >
              Official identifier of the gene. REQUIRED.
          symbol:
            type: string
            description: >
              Official gene symbol. REQUIRED.
          description:
            type: string
            description: >
              A free-text description of the gene
          alternate_ids:
            type: array
            description: >
              Alternative identifier(s) of the gene
            items:
              type: string
          xrefs:
            type: array
            description: >
              Related concept IDs (e.g. gene ortholog IDs) may be placed in xrefs
            items:
              type: string
          alternate_symbols:
            type: array
            description: >
              Alternative symbol(s) of the gene
            items:
              type: string

    Variation:
      type: object
      description: >
        Polymorphic GA4GH VRS variation object.
      oneOf:
        - $ref: "#/components/schemas/Allele"
        - $ref: "#/components/schemas/Haplotype"
        - $ref: "#/components/schemas/CopyNumber"
        - $ref: "#/components/schemas/TextVariation"

    Allele:
      type: object
      description: >
        A contiguous change at a specific sequence location.
      required:
        - location
        - state
      properties:
        id:
          type: string
          description: >
            Globally unique VRS identifier.
        location:
          $ref: "#/components/schemas/SequenceLocation"
          description: >
            Location of the allele on a reference sequence.
        state:
          $ref: "#/components/schemas/SequenceState"
          description: >
            Resulting sequence state.

    Haplotype:
      type: object
      description: >
        A set of alleles known to co-occur on the same molecule.
      required:
        - members
      properties:
        id:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/Allele"

    CopyNumber:
      type: object
      description: >
        Copy number variation over a genomic region.
      required:
        - location
        - copies
      properties:
        id:
          type: string
        location:
          $ref: "#/components/schemas/SequenceLocation"
        copies:
          type: integer
          description: >
            Absolute number of copies.

    TextVariation:
      type: object
      description: >
        Unstructured textual representation of a variation.
      required:
        - value
      properties:
        id:
          type: string
        value:
          type: string

    SequenceLocation:
      type: object
      description: >
        A location on a biological sequence.
      required:
        - sequence_id
        - interval
      properties:
        sequence_id:
          type: string
          description: >
            CURIE or URI identifying the reference sequence.
        interval:
          $ref: "#/components/schemas/SequenceInterval"

    SequenceInterval:
      type: object
      description: >
        Continuous interval on a sequence.
      required:
        - start
        - end
      properties:
        start:
          type: integer
          description: >
            0-based inclusive start position.
        end:
          type: integer
          description: >
            0-based exclusive end position.

    SequenceState:
      type: object
      description: >
        The resulting sequence after a variation.
      required:
        - sequence
      properties:
        sequence:
          type: string
          description: >
            Alternate sequence.

    Expression:
      type: object
      description: >
        A syntactic expression of a variation.
      required:
        - syntax
        - value
      properties:
        syntax:
          type: string
          description: >
            Expression syntax (e.g. hgvs.c, hgvs.g, spdi).
        value:
          type: string
          description: >
            Expression string.

    VcfRecord:
      type: object
      description: >
        Variant representation using VCF fields.
      required:
        - genome_assembly
        - chrom
        - pos
        - ref
        - alt
      properties:
        genome_assembly:
          type: string
          description: >
            Reference genome assembly (e.g. GRCh38).
        chrom:
          type: string
          description: >
            Chromosome identifier.
        pos:
          type: integer
          description: >
            1-based genomic position.
        ref:
          type: string
          description: >
            Reference allele.
        alt:
          type: string
          description: >
            Alternate allele.

      ExternalReference:
      type: object
      description: >
        Reference to an external resource.
      required:
        - id
      properties:
        id:
          type: string
          description: >
            Identifier of the external reference.
        description:
          type: string
          description: >
            Description of the reference.
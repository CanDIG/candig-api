openapi: 3.0.3
info:
  title: CanDIG-API
  version: 0.1.0
servers:
  - url: /v3
security:
  - {}
paths:
  /service-info:
    get:
      summary: Retrieve information about this service
      description: Returns information about the query service
      operationId: query_operations.get_service_info
      responses:
        200:
          description: Retrieve info about the Query service
          content:
            application/json:
              schema:
                type: object
  
  /datasets:
    get:
      summary: List datasets.
      description: |
        Gets a list of all datasets.
      operationId: dataset_operations.list_all
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetAggregateBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    
  /datasets/{id}:
    get:
      summary: Retrieve a dataset according to its ID
      description: |
        Gets a specific dataset by ID. Granularity of the response is
        dependent on the authorized level of access of the user
      operationId: dataset_operations.get_by_id
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/DatasetSingleNoMetadataBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    put:
      summary: Create a dataset corresponding to the given ID
      description: |
        Create a dataset corresponding to the given ID. If the dataset already exists, it will be
        replaced.
      operationId: dataset_operations.put_by_id
      requestBody:
        $ref: '#/components/requestBodies/DatasetSingleRequestBody'
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetSingleNoPeopleBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    delete:
      summary: Delete a dataset corresponding to the given ID
      description: |
        Delete a dataset at the given ID.
      operationId: dataset_operations.delete_by_id
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Response completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
  /datasets/{id}/metadata:
    get:
      summary: Retrieve a dataset's metadata
      description: |
        Gets the metadata (e.g. description, hospital source, contact info, etc)
        of a specific dataset by ID.
      operationId: dataset_operations.get_metadata
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMetadataBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    patch:
      summary: Alter a dataset's metadata
      description: |
        Alter a dataset's metadata
      operationId: dataset_operations.patch_metadata
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Posted metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMetadataBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
  /datasets/statistics:
    get:
      summary: Grab summary statistics for all datasets.
      description: |
        Gets an object of statistics for all datasets.
      operationId: dataset_operations.statistics
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatsBody'
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
  /datasets/{id}/statistics:
    get:
      summary: Grab summary statistics for the given dataset
      description: |
        Gets an object of statistics for the given dataset
      operationId: dataset_operations.statistics_by_id
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatsBody'
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets

  /datasets/{dataset_id}/persons:
    get:
      summary: List persons.
      description: |
        Gets a list of all persons. The granularity of the result is dependent on the user's 
        authorization level, but in general this returns only summary-level information. To obtain more
        information about a person, use the /datasets/{dataset_id}/persons/{id} endpoint.
      operationId: person_operations.list
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PersonAggregateBody'
                  - $ref: '#/components/schemas/PersonRowLevelBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
  /datasets/{dataset_id}/persons/{id}:
    get:
      summary: Get all details about a person
      description: |
        Gets a detailed view of all information available about a person
      operationId: person_operations.get_by_id
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      - in: path
        name: id
        required: true
        schema:
          title: Person Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PersonDetailedBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    put:
      summary: Insert a new person into the database, or replace an existing person.
      description: |
        Insert a new person into the database, or replace an existing person
      operationId: person_operations.post
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      - in: path
        name: id
        required: true
        schema:
          title: Person Id
          type: string
      requestBody:
        $ref: '#/components/requestBodies/PersonSingleRequestBody'
      responses:
        200:
          description: Updated aggregate person information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonAggregateBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    patch:
      summary: Alter an existing person in the database.
      description: |
        Alter an existing person in the database
      operationId: person_operations.patch_user
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      - in: path
        name: id
        required: true
        schema:
          title: Person Id
          type: string
      requestBody:
        $ref: '#/components/requestBodies/PersonSingleRequestBody'
      responses:
        200:
          description: Updated aggregate person information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonAggregateBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    delete:
      summary: Delete a person from the database.
      description: |
        Delete a person from the database
      operationId: person_operations.delete
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      - in: path
        name: id
        required: true
        schema:
          title: Person Id
          type: string
      responses:
        200:
          description: Updated aggregate person information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonAggregateBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons

components:
  responses:
    400BadRequestError:
      description: The request was not processed, as the request parameters did not adhere to the specification
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
    401UnauthorizedError:
      description: The request was not processed, as the request was missing an authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
    403ForbiddenError:
      description: The request was not processed, as the user in the given authentication token does not have sufficient privileges to proceed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
    404NotFoundError:
        description: The request was not processed, as the requested object was not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotFoundError'
    5xxServerError:
        description: Unspecified server error encountered
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
  requestBodies:
    DatasetSingleRequestBody:
      description: A full dataset, including all persons within it
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DatasetSingleBody'
        text/csv:
          schema:
            # Don't validate here -- we'll validate it and return an error later
            type: string
    PersonSingleRequestBody:
      description: All details about one person
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PersonDetailedBody'
  schemas:
    Error:
      type: object
      properties:
        query:
          type: object
          description: Error object container
          properties:
            error:
              type: string
              description: Name/type of the error that occurred
              example: ServerError
            message:
              type: string
              description: Message explaining why the error occurred
              example: An unspecified server error occurred
          required:
            - error
            - message
      required:
        - query
    BadRequestError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - properties:
            query:
              properties:
                error:
                  example: InvalidInput
                message:
                  example: "FOO is not an acceptable field"
    NotFoundError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - properties:
            query:
              properties:
                error:
                  example: NotFound
                message:
                  example: The requested resource could not be located
    DatasetSingleNoMetadataBody:
      type: object
      properties:
        id:
          type: string
        count:
          type: integer
    DatasetAggregateBody:
      type: array
      items:
        $ref: "#/components/schemas/DatasetSingleNoMetadataBody"
    DatasetSingleNoPeopleBody:
      properties:
        id:
          type: string
        dataset_info:
          $ref: "#/components/schemas/DatasetMetadataBody"
    DatasetSingleBody:
      properties:
        id:
          type: string
        persons:
          type: array
          items:
            $ref: "#/components/schemas/PersonRowLevelBody"
        dataset_info:
          $ref: "#/components/schemas/DatasetMetadataBody"
    DatasetRowLevelBody:
      type: array
      items:
        $ref: "#/components/schemas/DatasetSingleBody"
    SuccessBody:
      type: object
      properties:
        message:
          type: string
          default: "Operation completed successfully."
    DatasetMetadataBody:
      type: object
      properties:
        cohort_definition_id:
          description: This is the identifier given to the cohort, usually by the ATLAS application
          type: string
        cohort_definition_name:
          description: A short description of the cohort 
          type: string
        cohort_definition_description:
          description: A complete description of the cohort. 
          type: string
        definition_type_concept_id:
          description: Type defining what kind of Cohort Definition the record represents and how the syntax may be executed.
          type: integer
        cohort_definition_syntax:
          description: Syntax or code to operationalize the Cohort Definition.
          type: string
        subject_concept_id:
          description: This field contains a Concept that represents the domain of the subjects that are members of the cohort (e.g., Person, Provider, Visit).
          type: integer
        cohort_initiation_date:
          description: A date to indicate when the Cohort was initiated in the COHORT table.
          type: string
    DatasetStatsBody:
      type: object
      properties:
        person_count:
          type: integer
        primary_sites:
          type: object
        dataset_count:
          type: integer
          # What is this for?
        persons_per_dataset:
          type: object
          description: Keys are dataset IDs, values are the number of Persons
        treatment_type_count:
          type: object
          description: Keys are treatment types, values are the number of Persons
        age_at_diagnosis:
          type: object
          description: Keys are age ranges, values are the number of Persons
        completeness:
          type: object
    PersonRowLevelBody:
      type: array
      items:
        $ref: '#/components/schemas/PersonDetailedBody'
    PersonAggregateBody:
      type: array
      items:
        type: integer
        description: Person ID.
    PersonDetailedBody:
      type: object
      properties:
        person_id:
          description: Any person linkage that needs to occur to uniquely identify Persons ought to be done prior to writing this table. This identifier can be the original id from the source data provided if it is an integer, otherwise it can be an autogenerated number. It is assumed that every person with a different unique identifier is in fact a different person and should be treated independently.
          type: integer
        gender_concept_id:
          description: Use the gender or sex value present in the data under the assumption that it is the biological sex at birth. If the source data captures gender identity it should be stored in the OBSERVATION table. Accepted gender concepts. Please refer to the THEMIS repository for detailed conventions on how to populate this field. This field is meant to capture the biological sex at birth of the Person. This field should not be used to study gender identity issues.
          type: integer
        year_of_birth:
          description: For data sources with date of birth, the year should be extracted. If no year of birth is available all the person’s data should be dropped from the CDM instance. For additional information on how to populate this field, please refer to the THEMIS repository. Compute age using year_of_birth.
          type: integer
        month_of_birth:
          description: For data sources that provide the precise date of birth, the month should be extracted and stored in this field.
          type: integer
        day_of_birth:
          description: For data sources that provide the precise date of birth, the day should be extracted and stored in this field.
          type: integer
        birth_datetime:
          description: This field is not required but highly encouraged. For data sources that provide the precise datetime of birth, that value should be stored in this field. For more information on how to populate this field, please refer to the THEMIS repository.
          type: string
        race_concept_id:
          description: This field captures race or ethnic background of the person.  Only use this field if you have information about race or ethnic background. The Vocabulary contains Concepts about the main races and ethnic backgrounds in a hierarchical system. Due to the imprecise nature of human races and ethnic backgrounds, this is not a perfect system. Mixed races are not supported. If a clear race or ethnic background cannot be established, use Concept_Id.
          type: integer
        ethnicity_concept_id:
          description: This field captures Ethnicity as defined by the Office of Management and Budget (OMB) of the US Government - it distinguishes only between “Hispanic” and “Not Hispanic”. Races and ethnic backgrounds are not stored here. Only use this field if you have US-based data and a source of this information. Do not attempt to infer Ethnicity from the race or ethnic background of the Person.
          type: integer
        location_id:
          description: The location refers to the physical address of the person. This field should capture the last known location of the person.  Put the location_id from the LOCATION table here that represents the most granular location information for the person. For additional information on how to populate this field, please refer to the THEMIS repository.
          type: integer
        provider_id:
          description: The Provider refers to the last known primary care provider (General Practitioner).  Put the provider_id from the PROVIDER table of the last known general practitioner of the person. If there are multiple providers, it is up to the ETL to decide which to put here.
          type: integer
        care_site_id:
          description: The Care Site refers to where the Provider typically provides the primary care.
          type: integer
        person_source_value:
          description: Use this field to link back to persons in the source data. This is typically used for error checking of ETL logic. Some use cases require the ability to link back to persons in the source data. This field allows for the storing of the person value as it appears in the source. This field is not required but strongly recommended.
          type: string
        gender_source_value:
          description: This field is used to store the biological sex of the person from the source data. It is not intended for use in standard analytics but for reference only. Put the assigned sex at birth of the person as it appears in the source data.
          type: string
        gender_source_concept_id:
          description: Due to the small number of options, this tends to be zero. If the source data codes assigned sex at birth in a non-standard vocabulary, store the concept_id here.
          type: integer
        race_source_value:
          description: This field is used to store the race of the person from the source data. It is not intended for use in standard analytics but for reference only. Put the race of the person as it appears in the source data.
          type: string
        race_source_concept_id:
          description: Due to the small number of options, this tends to be zero. If the source data codes race in an OMOP supported vocabulary store the concept_id here.
          type: integer
        ethnicity_source_value:
          description: This field is used to store the ethnicity of the person from the source data. It is not intended for use in standard analytics but for reference only. If the person has an ethnicity other than the OMB standard of “Hispanic” or “Not Hispanic” store that value from the source data here.
          type: string
        ethnicity_source_concept_id:
          description: Due to the small number of options, this tends to be zero. If the source data codes ethnicity in an OMOP supported vocabulary, store the concept_id here.
          type: integer
    

    IngestDatasetInfo:
      type: object
      properties:
        study_id:
          description: "Unique identifier of the study in DHDP"
          type: string
        study_name:
          description: "The official name of the study, may be used for display purposes."
          type: string
        study_description:
          description: "A detailed description of the study’s purpose, hypothesis, and design."
          type: string
        program_name:
          description: "Indicate the overarching program the study belongs to (if applicable)"
          type: string
        keywords:
          description: "List of specific terms that describe the focus and content of the study."
          type: array
          items:
            type: string
        status:
          description: "Indicate if the study is completed or ongoing."
          type: string
          enum:
            - Ongoing
            - Completed
        context:
          description: "Indicate if the study was conducted in a clinical setting or as part of a research project."
          type: string
          enum:
            - Clinical
            - Research
        domain:
          description: "List of specific scientific or clinical domains addressed by the study."
          type: array
          items:
            type: string
            enum:
              - Aging
              - Birth Defects
              - Cancer
              - Circulatory and Respiratory Health
              - General Health
              - Infection and Immunity
              - Musculoskeletal Health and Arthritis
              - Neurodevelopmental Conditions
              - Neurosciences, Mental Health and Addiction
              - Nutrition, Metabolism and Diabetes
              - Population Genomics
              - Rare Diseases
              - Other
        dac_id:
          description: Unique identifier of the Data Access Committee (DAC) in DHDP to which the study is assigned.
          type: string
        participant_criteria:
          description: Inclusion/exclusion criteria for participants (e.g., specific cancer type, age range).
          type: string
        principal_investigators:
          description: "List of lead researchers responsible for the study in the format: FirstName LastName, Affiliation."
          type: array
          items:
            type: string
            example: "John Doe, Example Research Institute"
        lead_organizations:
          description: "List of institutions or organizations leading the study using its full official name."
          type: array
          items:
            type: string
        collaborators:
          description: "List of researchers, institutions or companies involved in the study. FirstName LastName (if individula) or Organization full official name, Role"
          type: array
          items:
            type: string
          example: ["Emily John, Data Contributor", "Biotech Inc., Industry Partner"]
        funding_sources:
          description: "List of organizations or agencies funding the study in the format: Funder name, Grant number"
          type: array
          items:
            type: string
          example: ["National Example Foundation, NEF-12345", "Example Health Research Council"]
        publication_links:
          description: "List of URL links to academic papers or reports associated with the study. providing a DOI URL formatted as https://doi.org/ followed by the DOI number."
          type: array
          items:
            type: string
            pattern: ^https:\/\/doi\.org\/10\.[0-9]{4,}\/
            example: "https://doi.org/10.1016/j.ccell.2025.03.014"


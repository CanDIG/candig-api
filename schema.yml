openapi: 3.0.3
info:
  title: CanDIG-API
  version: 0.1.0
servers:
  - url: /v1
security:
  - {}
paths:
  /service-info:
    get:
      summary: Retrieve information about this service
      description: Returns information about the query service
      operationId: query_operations.get_service_info
      responses:
        200:
          description: Retrieve info about the Query service
          content:
            application/json:
              schema:
                type: object

  /datasets:
    get:
      summary: List datasets.
      description: |
        Gets a list of all datasets.
      operationId: dataset_operations.list_all
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetAggregateBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    put:
      summary: Create a new dataset.
      description: |
        Creates a new dataset with the provided source_value, info, and optionally persons.
      operationId: dataset_operations.create
      requestBody:
        $ref: "#/components/requestBodies/DatasetSingleRequestBody"
      responses:
        201:
          description: Dataset created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetSingleNoPeopleBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        409:
          $ref: "#/components/responses/409ConflictError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets

  /datasets/insert_from_moh:
    post:
      summary: Create a new dataset.
      description: |
        Creates a new dataset with related clinical data
      operationId: dataset_operations.insert_from_moh
      requestBody:
        description: Generic JSON payload
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        201:
          description: Dataset created successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
        
  /datasets/statistics:
    get:
      summary: Grab summary statistics for all datasets.
      description: |
        Gets an object of statistics for all datasets.
      operationId: dataset_operations.statistics
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetStatsBody"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets

  /datasets/{id}:
    get:
      summary: Retrieve a dataset according to its ID
      description: |
        Gets a specific dataset by ID. Granularity of the response is
        dependent on the authorized level of access of the user
      operationId: dataset_operations.get_by_id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            title: Dataset Id
            type: integer
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetSingleNoInfoBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    put:
      summary: Update a dataset corresponding to the given ID
      description: |
        Update a dataset corresponding to the given ID. The dataset must already exist.
      operationId: dataset_operations.put_by_id
      requestBody:
        $ref: "#/components/requestBodies/DatasetSinglePutRequestBody"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            title: Dataset Id
            type: integer
      responses:
        200:
          description: Updated dataset information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetSingleNoPeopleBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    delete:
      summary: Delete a dataset corresponding to the given ID
      description: |
        Delete a dataset at the given ID.
      operationId: dataset_operations.delete_cascade
      parameters:
        - in: path
          name: id
          required: true
          schema:
            title: Dataset Id
            type: integer
      responses:
        200:
          description: Response completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
        
  /datasets/{id}/info:
    get:
      summary: Retrieve a dataset's info
      description: |
        Gets the info (e.g. description, hospital source, contact info, etc)
        of a specific dataset by ID.
      operationId: dataset_operations.get_info
      parameters:
        - in: path
          name: id
          required: true
          schema:
            title: Dataset Id
            type: integer
      responses:
        200:
          description: Retrieved dataset info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetInfoBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    patch:
      summary: Alter a dataset's info
      description: |
        Alter a dataset's info
      operationId: dataset_operations.patch_info
      parameters:
        - in: path
          name: id
          required: true
          schema:
            title: Dataset Id
            type: integer
      requestBody:
        description: Dataset info to update
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DatasetInfoBody"
      responses:
        200:
          description: Posted info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetInfoBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets

  /datasets/{id}/statistics:
    get:
      summary: Grab summary statistics for the given dataset
      description: |
        Gets an object of statistics for the given dataset
      operationId: dataset_operations.statistics_by_id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            title: Dataset Id
            type: integer
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndividualDatasetStatsBody"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets

  /datasets/{dataset_id}/persons:
    get:
      summary: List persons.
      description: |
        Gets a list of all persons. The granularity of the result is dependent on the user's 
        authorization level, but in general this returns only summary-level information. To obtain more
        information about a person, use the /datasets/{dataset_id}/persons/{id} endpoint.
      operationId: person_operations.list
      parameters:
        - in: path
          name: dataset_id
          required: true
          schema:
            title: Dataset Id
            type: integer
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/PersonAggregateBody"
                  - $ref: "#/components/schemas/PersonRowLevelBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    put:
      summary: Create a new person in the dataset.
      description: |
        Creates a new person in the specified dataset with the provided information.
      operationId: person_operations.create
      parameters:
        - in: path
          name: dataset_id
          required: true
          schema:
            title: Dataset Id
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/PersonSingleRequestNoIdBody"
      responses:
        201:
          description: Person created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonDetailedBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
        
  /datasets/{dataset_id}/persons/{id}:
    get:
      summary: Get all details about a person
      description: |
        Gets a detailed view of all information available about a person
      operationId: person_operations.get_by_id
      parameters:
        - in: path
          name: dataset_id
          required: true
          schema:
            title: Dataset Id
            type: integer
        - in: path
          name: id
          required: true
          schema:
            title: Person Id
            type: integer
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PersonDetailedBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    put:
      summary: Update an existing person.
      description: |
        Update an existing person
      operationId: person_operations.put
      parameters:
        - in: path
          name: dataset_id
          required: true
          schema:
            title: Dataset Id
            type: integer
        - in: path
          name: id
          required: true
          schema:
            title: Person Id
            type: integer
      requestBody:
        $ref: "#/components/requestBodies/PersonSingleRequestBody"
      responses:
        200:
          description: Updated aggregate person information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonDetailedBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    patch:
      summary: Alter an existing person in the database.
      description: |
        Alter an existing person in the database
      operationId: person_operations.patch_user
      parameters:
        - in: path
          name: dataset_id
          required: true
          schema:
            title: Dataset Id
            type: integer
        - in: path
          name: id
          required: true
          schema:
            title: Person Id
            type: integer
      requestBody:
        description: Partial person data to update
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Partial person object with any fields to update
      responses:
        200:
          description: Updated aggregate person information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonDetailedBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    delete:
      summary: Delete a person from the database.
      description: |
        Delete a person from the database
      operationId: person_operations.delete
      parameters:
        - in: path
          name: dataset_id
          required: true
          schema:
            title: Dataset Id
            type: integer
        - in: path
          name: id
          required: true
          schema:
            title: Person Id
            type: integer
      responses:
        200:
          description: Person deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBody"
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
        
components:
  responses:
    400BadRequestError:
      description: The request was not processed, as the request parameters did not adhere to the specification
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequestError"
    401UnauthorizedError:
      description: The request was not processed, as the request was missing an authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequestError"
    403ForbiddenError:
      description: The request was not processed, as the user in the given authentication token does not have sufficient privileges to proceed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BadRequestError"
    404NotFoundError:
      description: The request was not processed, as the requested object was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NotFoundError"
    409ConflictError:
      description: The request was not processed, as it conflicts with the current state of the resource
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ConflictError"
    5xxServerError:
      description: Unspecified server error encountered
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
            
  requestBodies:
    DatasetSingleRequestBody:
      description: A full dataset, including all persons within it
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DatasetSingleBody"
        text/csv:
          schema:
            # Don't validate here -- we'll validate it and return an error later
            type: string
    DatasetSinglePutRequestBody:
      description: A full dataset, including all persons within it
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DatasetSinglePutBody"
        text/csv:
          schema:
            # Don't validate here -- we'll validate it and return an error later
            type: string
    PersonSingleRequestBody:
      description: All details about one person
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PersonDetailedBody"
    PersonSingleRequestNoIdBody:
      description: All details about one person without id
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PersonBaseBody"
            
  schemas:
    Error:
      type: object
      properties:
        query:
          type: object
          description: Error object container
          properties:
            error:
              type: string
              description: Name/type of the error that occurred
              example: ServerError
            message:
              type: string
              description: Message explaining why the error occurred
              example: An unspecified server error occurred
          required:
            - error
            - message
      required:
        - query
        
    BadRequestError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - properties:
            query:
              properties:
                error:
                  example: InvalidInput
                message:
                  example: "FOO is not an acceptable field"
                  
    NotFoundError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - properties:
            query:
              properties:
                error:
                  example: NotFound
                message:
                  example: The requested resource could not be located
                  
    ConflictError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - properties:
            query:
              properties:
                error:
                  example: Conflict
                message:
                  example: The request conflicts with the current state of the resource
                  
    DatasetSingleNoInfoBody:
      type: object
      properties:
        id:
          type: integer
        source_value:
          type: string
        count:
          type: integer
          
    DatasetAggregateBody:
      type: array
      items:
        $ref: "#/components/schemas/DatasetSingleNoInfoBody"
        
    DatasetSingleNoPeopleBody:
      type: object
      properties:
        id:
          type: integer
        source_value:
          type: string
        info:
          $ref: "#/components/schemas/DatasetInfoBody"
          
    DatasetSingleBody:
      type: object
      properties:
        source_value:
          type: string
          description: The source value for the dataset
        persons:
          type: array
          items:
            $ref: "#/components/schemas/PersonBaseBody"
        info:
          $ref: "#/components/schemas/DatasetInfoBody"
      required:
        - source_value
        
    DatasetSinglePutBody:
      type: object
      properties:
        source_value:
          type: string
          description: The source value for the dataset
        persons:
          type: array
          items:
            anyOf:
              - $ref: "#/components/schemas/PersonBaseBody"
              - $ref: "#/components/schemas/PersonDetailedBody"
        info:
          $ref: "#/components/schemas/DatasetInfoBody"
      required:
        - source_value
        
    DatasetRowLevelBody:
      type: array
      items:
        $ref: "#/components/schemas/DatasetSingleBody"
        
    SuccessBody:
      type: object
      properties:
        message:
          type: string
          default: "Operation completed successfully."
          
    DatasetInfoBody:
      type: object
      properties:
        dataset_description:
          description: A complete description of the dataset.
          type: string
      additionalProperties: true
      description: Dataset information object that can contain various metadata fields
      
    DatasetStatsBody:
      type: object
      properties:
        person_count:
          type: integer
        dataset_count:
          type: integer
        persons_per_dataset:
          type: object
          description: Keys are dataset IDs, values are the number of Persons
          
    IndividualDatasetStatsBody:
      type: object
      properties:
        person_count:
          type: integer
          
    PersonRowLevelBody:
      type: array
      items:
        $ref: "#/components/schemas/PersonDetailedBody"
        
    PersonAggregateBody:
      type: array
      items:
        type: integer
        description: Person ID.
        
    PersonBaseBody:
      type: object
      properties:
        gender_concept_id:
          description: Use the gender or sex value present in the data under the assumption that it is the biological sex at birth. If the source data captures gender identity it should be stored in the OBSERVATION table. Accepted gender concepts. Please refer to the THEMIS repository for detailed conventions on how to populate this field. This field is meant to capture the biological sex at birth of the Person. This field should not be used to study gender identity issues.
          type: integer
        year_of_birth:
          description: For data sources with date of birth, the year should be extracted. If no year of birth is available all the person's data should be dropped from the CDM instance. For additional information on how to populate this field, please refer to the THEMIS repository. Compute age using year_of_birth.
          type: integer
        month_of_birth:
          description: For data sources that provide the precise date of birth, the month should be extracted and stored in this field.
          type: integer
        day_of_birth:
          description: For data sources that provide the precise date of birth, the day should be extracted and stored in this field.
          type: integer
        birth_datetime:
          description: This field is not required but highly encouraged. For data sources that provide the precise datetime of birth, that value should be stored in this field. For more information on how to populate this field, please refer to the THEMIS repository.
          type: string
        race_concept_id:
          description: This field captures race or ethnic background of the person.  Only use this field if you have information about race or ethnic background. The Vocabulary contains Concepts about the main races and ethnic backgrounds in a hierarchical system. Due to the imprecise nature of human races and ethnic backgrounds, this is not a perfect system. Mixed races are not supported. If a clear race or ethnic background cannot be established, use Concept_Id.
          type: integer
        ethnicity_concept_id:
          description: This field captures Ethnicity as defined by the Office of Management and Budget (OMB) of the US Government - it distinguishes only between "Hispanic" and "Not Hispanic". Races and ethnic backgrounds are not stored here. Only use this field if you have US-based data and a source of this information. Do not attempt to infer Ethnicity from the race or ethnic background of the Person.
          type: integer
        location_id:
          description: The location refers to the physical address of the person. This field should capture the last known location of the person.  Put the location_id from the LOCATION table here that represents the most granular location information for the person. For additional information on how to populate this field, please refer to the THEMIS repository.
          type: integer
          nullable: true
        provider_id:
          description: The Provider refers to the last known primary care provider (General Practitioner).  Put the provider_id from the PROVIDER table of the last known general practitioner of the person. If there are multiple providers, it is up to the ETL to decide which to put here.
          type: integer
          nullable: true
        care_site_id:
          description: The Care Site refers to where the Provider typically provides the primary care.
          type: integer
          nullable: true
        person_source_value:
          description: Use this field to link back to persons in the source data. This is typically used for error checking of ETL logic. Some use cases require the ability to link back to persons in the source data. This field allows for the storing of the person value as it appears in the source. This field is not required but strongly recommended.
          type: string
        gender_source_value:
          description: This field is used to store the biological sex of the person from the source data. It is not intended for use in standard analytics but for reference only. Put the assigned sex at birth of the person as it appears in the source data.
          type: string
        gender_source_concept_id:
          description: Due to the small number of options, this tends to be zero. If the source data codes assigned sex at birth in a non-standard vocabulary, store the concept_id here.
          type: integer
          nullable: true
        race_source_value:
          description: This field is used to store the race of the person from the source data. It is not intended for use in standard analytics but for reference only. Put the race of the person as it appears in the source data.
          type: string
        race_source_concept_id:
          description: Due to the small number of options, this tends to be zero. If the source data codes race in an OMOP supported vocabulary store the concept_id here.
          type: integer
          nullable: true
        ethnicity_source_value:
          description: This field is used to store the ethnicity of the person from the source data. It is not intended for use in standard analytics but for reference only. If the person has an ethnicity other than the OMB standard of "Hispanic" or "Not Hispanic" store that value from the source data here.
          type: string
        ethnicity_source_concept_id:
          description: Due to the small number of options, this tends to be zero. If the source data codes ethnicity in an OMOP supported vocabulary, store the concept_id here.
          type: integer
          nullable: true
      required:
        - gender_concept_id
        - race_concept_id
        - ethnicity_concept_id

    PersonDetailedBody:
      allOf:
        - $ref: "#/components/schemas/PersonBaseBody"
        - type: object
          properties:
            person_id:
              description: Any person linkage that needs to occur to uniquely identify Persons ought to be done prior to writing this table. This identifier can be the original id from the source data provided if it is an integer, otherwise it can be an autogenerated number. It is assumed that every person with a different unique identifier is in fact a different person and should be treated independently.
              type: integer
          required:
            - person_id
    

    # Top-level container
    OmopIngestBody:
      type: object
      required:
        - datasets
      properties:
        datasets:
          type: array
          items:
            $ref: '#/components/schemas/Dataset'

    Dataset:
      type: object
      required:
        - dataset_info
      properties:
        dataset_info:
          $ref: '#/components/schemas/DatasetInfo'
      additionalProperties: false

    DatasetInfo:
      type: object
      required:
        - omop_table
        - omop_record
      properties:
        omop_table:
          type: string
          const: dataset
        skip_errors:
          type: array
          items:
            type: string
        omop_record:
          $ref: '#/components/schemas/DatasetOmopRecord'
      additionalProperties: false

    DatasetOmopRecord:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/IdMap'
        source_value:
          type: string
          pattern: ^[A-Za-z0-9\-\._]{1,64}$
          example: SPECIMEN_0001
        object_data:
          type: array
          items:
            $ref: '#/components/schemas/ObjectData'
      additionalProperties: false

    IdMap:
      type: object
      required:
        - type
        - source_system
        - source_value
        - source_desc
        - target_desc
      properties:
        type:
          type: string
          enum: ['id_map']
        source_system:
          type: string
        source_value:
          type: string
          pattern: ^[A-Za-z0-9\-\._]{1,64}$
          example: SPECIMEN_0001
        source_desc:
          type: string
          pattern: ^[A-Za-z0-9\-\._]{1,64}$
          example: Specimen.submitter_specimen_id
        target_desc:
          type: string
      additionalProperties: false

    ObjectData:
      type: object
      properties:
        source_object_map:
          type: string
        omop_records:
          type: array
          items:
            $ref: '#/components/schemas/OmopRecordWrapper'
      additionalProperties: false

    OmopRecordWrapper:
      type: object
      required:
        - omop_table
        - omop_record
      properties:
        omop_table:
          type: string
          description: "OMOP CDM v5.4 table name."
          enum:
            - person
            - observation_period
            - visit_occurrence
            - visit_detail
            - condition_occurrence
            - procedure_occurrence
            - drug_exposure
            - device_exposure
            - measurement
            - observation
            - death
            - specimen
            - payer_plan_period
            - provider
            - care_site
            - location
            - location_history
            - fact_relationship
            - drug_era
            - condition_era
            - dose_era
        skip_errors:
          type: array
          items:
            type: string
        omop_record:
          # validate against specific table schemas when possible, else use the base fallback
          oneOf:
            - $ref: '#/components/schemas/PersonRecord'
            - $ref: '#/components/schemas/ObservationRecord'
            - $ref: '#/components/schemas/MeasurementRecord'
            - $ref: '#/components/schemas/ConditionOccurrenceRecord'
            - $ref: '#/components/schemas/ProcedureOccurrenceRecord'
            - $ref: '#/components/schemas/DrugExposureRecord'
            - $ref: '#/components/schemas/SpecimenRecord'
            - $ref: '#/components/schemas/ObservationPeriodRecord'
            - $ref: '#/components/schemas/VisitOccurrenceRecord'
            - $ref: '#/components/schemas/DeathRecord'
            - $ref: '#/components/schemas/EpisodeRecord'
            - $ref: '#/components/schemas/EpisodeEventRecord'
            - $ref: '#/components/schemas/FactRelationshipRecord'
            - $ref: '#/components/schemas/DrugEraRecord'
            - $ref: '#/components/schemas/ConditionEraRecord'
            - $ref: '#/components/schemas/DoseEraRecord'
            - $ref: '#/components/schemas/ProviderRecord'
            - $ref: '#/components/schemas/CareSiteRecord'
            - $ref: '#/components/schemas/LocationRecord'
            - $ref: '#/components/schemas/PayerPlanPeriodRecord'
      additionalProperties: false


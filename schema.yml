openapi: 3.0.3
info:
  title: CanDIG-API
  version: 0.1.0
servers:
  - url: /v3
security:
  - {}
paths:
  /service-info:
    get:
      summary: Retrieve information about this service
      description: Returns information about the query service
      operationId: query_operations.get_service_info
      responses:
        200:
          description: Retrieve info about the Query service
          content:
            application/json:
              schema:
                type: object
  
  /datasets:
    get:
      summary: List datasets.
      description: |
        Gets a list of all datasets.
      operationId: dataset_operations.list_all
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetAggregateBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    
  /datasets/{id}:
    get:
      summary: Retrieve a dataset according to its ID
      description: |
        Gets a specific dataset by ID. Granularity of the response is
        dependent on the authorized level of access of the user
      operationId: dataset_operations.get_by_id
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DatasetAggregateBody'
                  - $ref: '#/components/schemas/DatasetRowLevelBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    put:
      summary: Create a dataset corresponding to the given ID
      description: |
        Create a dataset corresponding to the given ID. If the dataset already exists, it will be
        replaced.
      operationId: dataset_operations.post_by_id
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetRowLevelBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    delete:
      summary: Delete a dataset corresponding to the given ID
      description: |
        Delete a dataset at the given ID.
      operationId: dataset_operations.delete_by_id
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Response completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
  /datasets/{id}/metadata:
    get:
      summary: Retrieve a dataset's metadata
      description: |
        Gets the metadata (e.g. description, hospital source, contact info, etc)
        of a specific dataset by ID.
      operationId: dataset_operations.get_metadata
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMetadataBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
    patch:
      summary: Alter a dataset's metadata
      description: |
        Alter a dataset's metadata
      operationId: dataset_operations.patch_metadata
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Posted metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetMetadataBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
  /datasets/statistics:
    get:
      summary: Grab summary statistics for all datasets.
      description: |
        Gets an object of statistics for all datasets.
      operationId: dataset_operations.statistics
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatsBody'
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets
  /datasets/{id}/statistics:
    get:
      summary: Grab summary statistics for the given dataset
      description: |
        Gets an object of statistics for the given dataset
      operationId: dataset_operations.statistics_by_id
      parameters:
      - in: path
        name: id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetStatsBody'
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Datasets

  /datasets/{dataset_id}/persons:
    get:
      summary: List persons.
      description: |
        Gets a list of all persons. The granularity of the result is dependent on the user's 
        authorization level, but in general this returns only summary-level information. To obtain more
        information about a person, use the /datasets/{dataset_id}/persons/{id} endpoint.
      operationId: person_operations.list
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PersonAggregateBody'
                  - $ref: '#/components/schemas/PersonRowLevelBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
  /datasets/{dataset_id}/persons/{id}:
    get:
      summary: Get all details about a person
      description: |
        Gets a detailed view of all information available about a person
      operationId: person_operations.get_by_id
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      - in: path
        name: id
        required: true
        schema:
          title: Person Id
          type: string
      responses:
        200:
          description: Retrieved dataset information
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PersonDetailedBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    put:
      summary: Insert a new person into the database, or replace an existing person.
      description: |
        Insert a new person into the database, or replace an existing person
      operationId: person_operations.post
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      - in: path
        name: id
        required: true
        schema:
          title: Person Id
          type: string
      responses:
        200:
          description: Updated aggregate person information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonAggregateBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    patch:
      summary: Alter an existing person in the database.
      description: |
        Alter an existing person in the database
      operationId: person_operations.patch_user
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      - in: path
        name: id
        required: true
        schema:
          title: Person Id
          type: string
      responses:
        200:
          description: Updated aggregate person information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonAggregateBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons
    delete:
      summary: Delete a person from the database.
      description: |
        Delete a person from the database
      operationId: person_operations.delete
      parameters:
      - in: path
        name: dataset_id
        required: true
        schema:
          title: Dataset Id
          type: string
      - in: path
        name: id
        required: true
        schema:
          title: Person Id
          type: string
      responses:
        200:
          description: Updated aggregate person information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonAggregateBody'
        400:
          $ref: "#/components/responses/400BadRequestError"
        401:
          $ref: "#/components/responses/401UnauthorizedError"
        403:
          $ref: "#/components/responses/403ForbiddenError"
        404:
          $ref: "#/components/responses/404NotFoundError"
        5XX:
          $ref: "#/components/responses/5xxServerError"
      tags:
        - Persons

components:
  requestBodies:
    BeaconRequestBody:
      content:
        'application/json':
          schema:
            type: object
            description: Schema for the Beacon request.
            properties:
              meta:
                $ref: '#/components/schemas/BeaconRequestMeta'
              query:
                $ref: '#/components/schemas/BeaconQuery'
            required:
              - meta
              - query
  responses:
    400BadRequestError:
      description: The request was not processed, as the request parameters did not adhere to the specification
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
    401UnauthorizedError:
      description: The request was not processed, as the request was missing an authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
    403ForbiddenError:
      description: The request was not processed, as the user in the given authentication token does not have sufficient privileges to proceed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
    404NotFoundError:
        description: The request was not processed, as the requested object was not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotFoundError'
    5xxServerError:
        description: Unspecified server error encountered
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
    BeaconErrorResponse:
      description: An unsuccessful operation.
      content:
        application/json:
          schema:
            properties:
              error:
                description: Beacon-specific error.
                properties:
                  errorCode:
                    description: Entry not found
                    format: int32
                    type: integer
                  errorMessage:
                    type: string
                required:
                  - errorCode
                type: object
              meta:
                $ref: '#/components/schemas/BeaconResponseMeta'
            required:
              - meta
              - error
            type: object
  schemas:
    Error:
      type: object
      properties:
        query:
          type: object
          description: Error object container
          properties:
            error:
              type: string
              description: Name/type of the error that occurred
              example: ServerError
            message:
              type: string
              description: Message explaining why the error occurred
              example: An unspecified server error occurred
          required:
            - error
            - message
      required:
        - query
    BadRequestError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - properties:
            query:
              properties:
                error:
                  example: InvalidInput
                message:
                  example: "FOO is not an acceptable field"
    NotFoundError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - properties:
            query:
              properties:
                error:
                  example: NotFound
                message:
                  example: The requested resource could not be located
    DatasetAggregateBody:
      type: object
      # todo
    DatasetRowLevelBody:
      type: object
      # todo
    SuccessBody:
      type: object
      # todo
    DatasetMetadataBody:
      type: object
      # todo
    DatasetStatsBody:
      type: object
      properties:
        person_count:
          type: object
        primary_sites:
          type: object
        dataset_count:
          type: object
        persons_per_dataset:
          type: object
        treatment_type_count:
          type: object
        age_at_diagnosis:
          type: object
        completeness:
          type: object
    PersonRowLevelBody:
      type: object
      # todo
    PersonAggregateBody:
      type: object
      # todo
    PersonDetailedBody:
      type: object
      # todo
    BeaconResponseMeta:
      description: Information about the response that could be relevant for the Beacon client in order to interpret the results.
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        beaconId:
          $ref: '#/components/schemas/BeaconId'
        receivedRequestSummary:
          $ref: '#/components/schemas/BeaconReceivedRequestSummary'
        returnedGranularity:
          $ref: '#/components/schemas/Granularity'
        returnedSchemas:
          $ref: '#/components/schemas/ListOfSchemas'
      required:
        - beaconId
        - apiVersion
        - returnedSchemas
        - returnedGranularity
        - receivedRequestSummary
      type: object
    BeaconId:
      description: The Id of a Beacon. Usually a reversed domain string, but any URI is acceptable. The purpose of this attribute is, in the context of a Beacon network, to disambiguate responses coming from different Beacons.
      type: string
    BeaconQuery:
      description: Parameters to limit the list of returned results.
      type: object
      properties:
        includeResultsetResponses:
          $ref: '#/components/schemas/IncludeResultsetResponses'
        pagination:
          $ref: '#/components/schemas/PaginationRequest'
        requestParameters:
          $ref: '#/components/schemas/RequestParameters'
        requestedGranularity:
          $ref: '#/components/schemas/Granularity'
    BeaconReceivedRequestSummary:
      description: >-
        Section of the response that summarize the request received as it has
        been interpreted by the Beacon server. This summary can help to identify
        differences between the incoming request and its interpretation or processing,
        e.g. in the response granularity or pagination.
        The required properties include those that should be part of every request.
      type: object
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        requestedSchemas:
          $ref: '#/components/schemas/ListOfSchemas'
        requestParameters:
          $ref: '#/components/schemas/RequestParameters'
        includeResultsetResponses:
          $ref: '#/components/schemas/IncludeResultsetResponses'
        pagination:
          $ref: '#/components/schemas/Pagination'
        requestedGranularity:
          $ref: '#/components/schemas/Granularity'
      required:
        - apiVersion
        - requestedSchemas
        - pagination
        - requestedGranularity
    Granularity:
      default: boolean
      description: |-
        Level of detail of the response:
        * `boolean`: returns true/false' responses
        * `count`: adds the total number of positive results found
        * `aggregated`: returns summary, aggregated or distribution like responses
        * `record`: returns details for every row. In cases where a Beacon prefers to return records with fewer than all attributes, different strategies have to be considered w/o adding them to the current design, e.g.:
            - keeping non-mandatory attributes empty
            - Beacon to provide a minimal record definition
      enum:
        - boolean
        - count
        - aggregated
        - record
      type: string
    IncludeResultsetResponses:
      default: HIT
      description: Indicator of whether responses from every Resultset should be included in the response to this request or just the ones with positive, negative results or no details at all. If null (not specified), the default value of 'HIT' is assumed. This parameter allows for returning boolean/counting results although the Beacon instance is capable to return record level details.
      enum:
        - ALL
        - HIT
        - MISS
        - NONE
      type: string
    PageSize:
      default: 10
      description: Size of the page. Use `0` to return all the results or the maximum allowed by the Beacon, if there is any.
      example: 10
      minimum: 0
      type: integer
    PageToken:
      description: A hash or similar that allows the server to retrieve a "page", e.g. (a subset of) a query response.
      example: ab0sc&fe1dd
      type: string
    Pagination:
      description: Pagination that has been applied on the results.
      properties:
        currentPage:
          $ref: '#/components/schemas/PageToken'
        pageSize:
          $ref: '#/components/schemas/PageSize'
        nextPage:
          $ref: '#/components/schemas/PageToken'
        previousPage:
          $ref: '#/components/schemas/PageToken'
        skip:
          $ref: '#/components/schemas/Skip'
      type: object
    PaginationRequest:
      description: Pagination to apply on the results.
      properties:
        page:
          $ref: '#/components/schemas/PageToken'
        pageSize:
          $ref: '#/components/schemas/PageSize'
        skip:
          $ref: '#/components/schemas/Skip'
    RequestParameters:
      type: object
      # todo
    Skip:
      default: 0
      description: |
        * In the request: number of pages to skip
        * In the response: number of pages that has been skipped
      example: 0
      minimum: 0
      type: integer
    BeaconRequestMeta:
      description: Meta section of the Beacon request. It includes request context details relevant for the Beacon server when processing the request.
      properties:
        apiVersion:
          $ref: '#/components/schemas/ApiVersion'
        requestedSchemas:
          $ref: '#/components/schemas/ListOfSchemas'
      required:
        - apiVersion
      type: object
    ApiVersion:
      description: Version of API, e.g. in request or response. Beacon uses a Github-style, "v"-prefixed semantic versioning format.
      type: string
    SchemasPerEntity:
      description: Schema to be used for the requested entry type in the response.
      properties:
        entityType:
          example: Individual
          type: string
        schema:
          type: string
      type: object
    ListOfSchemas:
      description: Set of schemas to be used in the response to a request.
      items:
        $ref: '#/components/schemas/SchemasPerEntity'
      type: array
    